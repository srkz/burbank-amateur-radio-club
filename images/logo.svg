<?xml version="1.0" encoding="UTF-8"?>
<!--
  BARC logo: a line-art Shiba Inu in profile, mouth open,
  with radio waves emanating instead of a "bark" sound.
  Designed as a simple black outline that scales cleanly.
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 900 950"
     role="img"
     aria-labelledby="logoTitle logoDesc">
  <title id="logoTitle">Burbank Amateur Radio Club logo</title>
  <desc id="logoDesc">
    A line-art Shiba Inu in side profile with an open mouth and a curled
    tail. Three concentric radio waves radiate outward from the dog's
    mouth in place of a bark.
  </desc>

  <g fill="none" stroke="#000" stroke-width="16"
     stroke-linecap="round" stroke-linejoin="round">

    <!-- Head, ears, back, tail, chest outline (continuous silhouette) -->
    <path d="
      M 545 195
      L 470 75
      L 410 200
      L 345 135
      L 300 235
      C 250 260 205 305 180 360
      C 155 420 150 495 175 560
      C 140 565 110 585 95 625
      C 80 670 100 720 145 735
      C 175 745 205 735 225 715
      C 245 735 265 755 290 770
      L 295 915
      M 360 790
      L 365 920
      M 540 800
      L 545 920
      M 655 760
      L 660 915
      C 560 830 470 820 385 820
      C 320 820 265 805 230 775
    "/>

    <!-- Curled tail -->
    <path d="
      M 220 480
      C 170 445 120 470 105 525
      C 95 575 130 620 180 615
      C 220 610 240 575 225 545
      C 215 525 190 520 175 540
      C 165 555 175 575 195 575
    "/>

    <!-- Back line and rump connecting to tail base -->
    <path d="M 230 470 C 290 420 370 395 445 395"/>

    <!-- Belly line -->
    <path d="M 295 770 C 370 790 460 790 545 775"/>

    <!-- Muzzle, open mouth, jaw -->
    <path d="
      M 540 200
      C 605 210 660 255 690 310
      C 705 340 700 370 680 385
      L 735 360
    "/>
    <path d="
      M 680 385
      C 650 395 615 395 585 385
      C 560 378 545 365 540 350
    "/>
    <!-- Small teeth / tongue hint inside mouth -->
    <path d="M 610 360 L 620 380 L 635 362"/>

    <!-- Closed, smiling eye -->
    <path d="M 495 255 q 25 -20 55 0"/>

    <!-- Nose dot -->
    <circle cx="720" cy="325" r="10" fill="#000" stroke="none"/>

    <!-- Radio waves emanating from the mouth -->
    <path d="M 760 255 A 90 90 0 0 1 760 385"/>
    <path d="M 800 215 A 140 140 0 0 1 800 425"/>
    <path d="M 840 175 A 190 190 0 0 1 840 465"/>
  </g>
</svg>
